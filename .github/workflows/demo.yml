name: Generate Demo GIF

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'demo.tape'
      - 'examples/basic/**'
      - 'examples/strict/**'
      - 'examples/minimal/**'

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install ruleprobe globally from dist
        run: npm install -g .

      - name: Install VHS and system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg ttyd
          # Install VHS from GitHub releases (bundles its own renderer)
          VHS_VERSION="0.9.0"
          wget -qO vhs.tar.gz "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf vhs.tar.gz vhs
          sudo mv vhs /usr/local/bin/vhs
          vhs --version

      - name: Generate demo GIF
        run: vhs demo.tape

      - name: Commit demo GIF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update demo GIF [skip ci]"
          file_pattern: "demo.gif"

name: Generate Demo GIF

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'demo.tape'
      - 'examples/basic/**'
      - 'examples/strict/**'
      - 'examples/minimal/**'

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install ruleprobe to /usr/local/bin
        run: |
          npm install -g .
          # Make absolutely sure it's at a known path VHS shell can find
          RULEPROBE_BIN=$(which ruleprobe || npm bin -g)/ruleprobe
          sudo cp "$RULEPROBE_BIN" /usr/local/bin/ruleprobe 2>/dev/null || true
          echo "ruleprobe path: $(which ruleprobe)"
          ruleprobe --version

      - name: Install VHS and system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg ttyd
          VHS_VERSION="0.9.0"
          wget -qO vhs.tar.gz "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          mkdir -p vhs_extracted
          tar -xzf vhs.tar.gz -C vhs_extracted
          VHS_BIN=$(find vhs_extracted -name 'vhs' -type f | head -1)
          sudo cp "$VHS_BIN" /usr/local/bin/vhs
          sudo chmod +x /usr/local/bin/vhs
          vhs --version

      - name: Generate demo GIF
        run: vhs demo.tape
        env:
          PATH: /usr/local/bin:/usr/bin:/bin

      - name: Commit demo GIF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update demo GIF [skip ci]"
          file_pattern: "demo.gif"
